<main>
  <header class="app-header">
    <div class="app-title">
      <h1>{{ title() }}</h1>
    </div>
    <div class="connection-status">
      <span>Estado base de datos:</span>
      <strong
        [class.connected]="status() === 'connected'"
        [class.disconnected]="status() === 'disconnected'"
        [class.pending]="status() === 'pending'"
      >
        {{ status() === 'pending' ? 'Verificando...' : status() === 'connected' ? 'Conectado' : 'Desconectado' }}
      </strong>
    </div>
    <p *ngIf="error()" class="connection-error">Error: {{ error() }}</p>
  </header>

  <router-outlet />
</main>

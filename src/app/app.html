<div class="min-h-screen flex flex-col bg-slate-50 text-slate-900">
  <!-- Firebase Connection Status Badge -->
  <div class="fixed top-4 right-4 z-50">
    @switch(status()) {
      @case('connected') {
        <div class="flex items-center gap-2 px-3 py-2 bg-green-100 border border-green-300 rounded-lg shadow-sm">
          <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
          <span class="text-xs font-semibold text-green-700">Firebase: Conectado</span>
        </div>
      }
      @case('disconnected') {
        <div class="flex items-center gap-2 px-3 py-2 bg-red-100 border border-red-300 rounded-lg shadow-sm">
          <div class="w-2 h-2 bg-red-500 rounded-full"></div>
          <span class="text-xs font-semibold text-red-700">Firebase: Desconectado</span>
          @if(error()) {
            <button (click)="showErrorDetails = !showErrorDetails" title="Ver detalles">
              <i class="fas fa-info-circle ml-1 text-red-600 cursor-help"></i>
            </button>
          }
        </div>
      }
      @case('pending') {
        <div class="flex items-center gap-2 px-3 py-2 bg-yellow-100 border border-yellow-300 rounded-lg shadow-sm">
          <div class="w-2 h-2 bg-yellow-500 rounded-full animate-spin"></div>
          <span class="text-xs font-semibold text-yellow-700">Firebase: Conectando...</span>
        </div>
      }
    }
  </div>

  <app-navbar></app-navbar>
  <main class="flex-1">
    <router-outlet></router-outlet>
  </main>
  <app-footer></app-footer>
</div>
